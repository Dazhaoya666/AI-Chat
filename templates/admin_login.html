<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - 管理员登录</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .admin-login-box {
            background: linear-gradient(135deg, #2C3E50 0%, #4A6741 100%);
            color: white;
        }
        .admin-login-box .logo-icon {
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .admin-badge {
            display: inline-block;
            background: #E74C3C;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box admin-login-box">
            <div class="logo">
                <div class="logo-icon">🔐</div>
                <h1>管理员登录 <span class="admin-badge">ADMIN</span></h1>
                <p>系统管理后台入口</p>
            </div>
            
            <form id="adminLoginForm" class="form active">
                <div class="input-group">
                    <label>管理员账号</label>
                    <input type="text" id="adminUsername" placeholder="请输入管理员账号" required>
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="adminPassword" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn btn-primary">登录管理后台</button>
            </form>
            
            <div style="text-align: center; margin-top: 20px;">
                <a href="/" style="color: rgba(255,255,255,0.8); text-decoration: none; font-size: 14px;">← 返回用户登录</a>
            </div>
            
            <div id="message" class="message"></div>
        </div>
    </div>
    
    <script>
        function showMessage(text, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.className = 'message ' + type;
        }
        
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('admin_token', data.access_token);
                    localStorage.setItem('admin_username', username);
                    window.location.href = '/admin';
                } else {
                    showMessage(data.detail || '登录失败', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请重试', 'error');
            }
        });
        
        // 如果已有用户token，清除它
        if (localStorage.getItem('token')) {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
        }
    </script>
</body>
</html>
