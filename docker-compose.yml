version: '3.8'

services:
  ai-chat:
    build: .
    container_name: ai-chat-app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Shanghai
      - OPENAI_API_KEY=${OPENAI_API_KEY:-your_api_key_here}
    volumes:
      - ./data:/app/data
      - ./static/uploads:/app/static/uploads
    networks:
      - ai-chat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  ai-chat-network:
    driver: bridge
